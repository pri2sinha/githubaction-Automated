name: Build and Deploy to Tomcat

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Install Maven
      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      # 4. Build WAR file
      - name: Build WAR file
        run: mvn clean package

      # 5. Verify WAR file
      - name: Verify WAR file
        run: ls target

      # 6. Copy WAR to server
      - name: Copy WAR to Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "target/*.war"
          target: "/home/ubuntu/"

      # 7. Deploy to Tomcat
      - name: Deploy WAR and Restart Tomcat
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Stopping old deployments..."
            sudo rm -rf /home/ubuntu/apache-tomcat-10.1.53/webapps/*.war

            echo "Copying new WAR..."
            sudo cp /home/ubuntu/*.war /home/ubuntu/apache-tomcat-10.1.53/webapps/

            echo "Restarting Tomcat..."
            sudo systemctl restart tomcat10

            echo "Deployment completed!"
